<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Созвездие Большого Пса</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05070a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent; /* Убирает блик при клике на мобильных */
        }

        /* Фон со звездами */
        #sky {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }

        /* Обычные фоновые звезды */
        .bg-star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* Без названия, но в созвездии */
        .constellation-dot {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 9;
        }

        /* Именованные звезды (пульсирующие) */
        .constellation-star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            transform: translate(-50%, -50%);
            animation: pulsate 2s infinite ease-in-out;
            transition: transform 0.2s ease-out; /* Для ховера */
        }

        .constellation-star:hover {
            animation: none; /* Выключаем пульсацию при ховере */
            transform: translate(-50%, -50%) scale(1.6);
            box-shadow: 0 0 20px #fff, 0 0 40px #ff9f43;
        }

        @keyframes pulsate {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(79, 172, 254, 0.8);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.3);
                box-shadow: 0 0 20px rgba(255, 255, 255, 1), 0 0 40px rgba(79, 172, 254, 1);
            }
        }

        /* Линии созвездия */
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        line {
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 0.8;
        }

        /* Всплывающие подсказки (светящиеся, плавные) */
        .tooltip {
            position: absolute;
            background: rgba(10, 20, 35, 0.9);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            pointer-events: none;
            
            opacity: 0;
            transform: translate(-50%, -160%) scale(0.8);
            transition: opacity 0.4s ease, transform 0.4s ease;
            
            white-space: nowrap;
            z-index: 100;
            
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2), 0 0 30px rgba(79, 172, 254, 0.4);
            
            visibility: hidden; /* Чтобы не мешала, пока скрыта */
        }

        .tooltip.active {
            opacity: 1;
            transform: translate(-50%, -160%) scale(1);
            visibility: visible;
        }

        .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -6px;
            border-width: 6px;
            border-style: solid;
            border-color: rgba(10, 20, 35, 0.9) transparent transparent transparent;
        }

        /* Адаптация под телефон */
        @media (max-width: 600px) {
            .constellation-star {
                /* Немного увеличим базовый размер для пальцев */
                width: calc(var(--base-size) * 1.3) !important;
                height: calc(var(--base-size) * 1.3) !important;
            }
            .tooltip {
                font-size: 14px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>

<div id="sky">
    <svg id="lines-container"></svg>
    <div id="tooltip" class="tooltip"></div>
</div>

<script>
    const sky = document.getElementById('sky');
    const tooltip = document.getElementById('tooltip');
    const svg = document.getElementById('lines-container');

    // Данные звезд созвездия (координаты в % от экрана)
    // base_size используется в CSS переменной для адаптации
    const starsData = [
        { name: "Сириус", x: 60, y: 25, size: 10, named: true },
        { name: "Мирзам", x: 80, y: 38, size: 6, named: true },
        { name: "Везен", x: 30, y: 55, size: 7, named: true },
        { name: "Адара", x: 35, y: 68, size: 8, named: true },
        { name: "Алудра", x: 12, y: 63, size: 6, named: true },
        
        // Звезды без названий (серые точки)
        { x: 35, y: 46, size: 4 }, // "Грудь"
        { x: 45, y: 15, size: 3 }, // "Ухо"
        { x: 50, y: 21, size: 4 }, // "Голова"
        { x: 58, y: 4.5, size: 3 }, // "Нос"
        { x: 65, y: 37, size: 3 }, // Соед. Мирзам
        { x: 61, y: 52, size: 3 }, // Передняя лапа
        { x: 62.5, y: 83.5, size: 3 }, // Задняя лапа
        { x: 35, y: 84, size: 3 }, // Хвост нижний
        { x: 31, y: 62, size: 2 }, // Мелочь у Везена
    ];

    // Линии между звездами (индексы из массива starsData)
    const connections = [
        [0, 1], [0, 5], [0, 7], // Сириус
        [7, 6], [7, 8], // Голова
        [5, 2], [5, 9], // Тело
        [9, 10], // Передняя лапа
        [2, 3], [2, 4], // Задняя часть
        [3, 11], [3, 12] // Хвост/лапа
    ];

    // Функция отрисовки линий
    function drawLines() {
        svg.innerHTML = '';
        const w = window.innerWidth;
        const h = window.innerHeight;

        connections.forEach(pair => {
            const s1 = starsData[pair[0]];
            const s2 = starsData[pair[1]];
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", (s1.x * w) / 100);
            line.setAttribute("y1", (s1.y * h) / 100);
            line.setAttribute("x2", (s2.x * w) / 100);
            line.setAttribute("y2", (s2.y * h) / 100);
            svg.appendChild(line);
        });
    }

    // Создаем интерактивные и обычные звезды
    starsData.forEach((data, index) => {
        const star = document.createElement('div');
        
        if (data.named) {
            star.className = 'constellation-star';
            star.style.setProperty('--base-size', data.size + 'px');
            star.style.width = data.size + 'px';
            star.style.height = data.size + 'px';

            star.addEventListener('click', (e) => {
                tooltip.innerText = data.name;
                tooltip.style.left = data.x + '%';
                tooltip.style.top = data.y + '%';
                
                // Плавно показываем
                tooltip.classList.add('active');
                
                // Скрыть через 3 секунды
                clearTimeout(window.tooltipTimeout);
                window.tooltipTimeout = setTimeout(() => {
                    tooltip.classList.remove('active');
                }, 3000);
                
                e.stopPropagation();
            });
        } else {
            star.className = 'constellation-dot';
            star.style.width = data.size + 'px';
            star.style.height = data.size + 'px';
        }

        star.style.left = data.x + '%';
        star.style.top = data.y + '%';
        sky.appendChild(star);
    });

    // Создаем фоновые мелкие звезды (для глубины)
    for (let i = 0; i < 200; i++) {
        const star = document.createElement('div');
        star.className = 'bg-star';
        const size = Math.random() * 2;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--duration', (Math.random() * 4 + 2) + 's');
        sky.appendChild(star);
    }

    // Скрывать подсказку при клике в любое другое место
    window.addEventListener('click', () => {
        tooltip.classList.remove('active');
    });

    // Инициализация и адаптивность линий
    drawLines();
    window.addEventListener('resize', drawLines);
</script>

</body>
</html>
