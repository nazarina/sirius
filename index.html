<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Интерактивный Большой Пёс 3D</title>
    <style>
        :root {
            --sky-bg: radial-gradient(circle at center, #1b2735 0%, #05070a 100%);
            --star-color: #fff;
            --star-glow: rgba(100, 200, 255, 0.8);
            --star-glow-intense: rgba(255, 255, 255, 1);
            --popup-bg: rgba(10, 25, 45, 0.95);
            --popup-border: rgba(100, 200, 255, 0.5);
            --popup-text: #e0f0ff;
            --frame-glow: 0 0 30px rgba(79, 172, 254, 0.5), inset 0 0 15px rgba(79, 172, 254, 0.3);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* Для 3D эффекта рамки */
            -webkit-tap-highlight-color: transparent;
        }

        /* Основной контейнер с 3D рамкой */
        #scene-container {
            position: relative;
            width: 90vw;
            height: 80vh;
            max-width: 1000px;
            max-height: 700px;
            background: var(--sky-bg);
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: var(--frame-glow);
            overflow: hidden;
            transition: transform 0.1s ease-out; /* Для движения мыши */
            
            /* Эффект стеклянной поверхности */
            background-image: 
                linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 50%),
                var(--sky-bg);
        }

        /* Фон со звездами внутри контейнера */
        #sky {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* Обычные фоновые звезды */
        .bg-star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.4;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        /* --- Яркие сияющие звезды созвездия --- */
        .constellation-star {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            transform: translate(-50%, -50%);
            
            /* Сложное, плавное сияние */
            background: radial-gradient(circle, var(--star-glow-intense) 20%, rgba(255,255,255,0) 70%);
            
            /* Пульсация размера и интенсивности свечения */
            animation: superGlow 3s infinite ease-in-out;
            transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
        }

        /* Внутренняя яркая точка */
        .constellation-star::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 40%; height: 40%;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #fff;
        }

        .constellation-star:hover {
            animation: none; /* Остановить пульсацию при наведении */
            transform: translate(-50%, -50%) scale(1.4);
            box-shadow: 0 0 30px #fff, 0 0 50px #4facfe, 0 0 70px #4facfe;
        }

        @keyframes superGlow {
            0%, 100% {
                box-shadow: 0 0 15px var(--star-glow), 0 0 30px var(--star-glow), 0 0 45px rgba(79, 172, 254, 0.4);
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                box-shadow: 0 0 25px #fff, 0 0 50px #4facfe, 0 0 80px #4facfe, 0 0 100px rgba(79, 172, 254, 0.6);
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        /* Маленькие точки без названий */
        .constellation-dot {
            position: absolute;
            background: rgba(200, 230, 255, 0.7);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 9;
            box-shadow: 0 0 5px rgba(100, 200, 255, 0.5);
        }

        /* Линии созвездия */
        svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        line {
            stroke: rgba(100, 200, 255, 0.15);
            stroke-width: 1;
        }

        /* --- Всплывающие облачка с фактами --- */
        .star-popup {
            position: absolute;
            background: var(--popup-bg);
            border: 1px solid var(--popup-border);
            border-radius: 12px;
            padding: 15px;
            width: 220px;
            color: var(--popup-text);
            
            /* Эффект появления */
            opacity: 0;
            visibility: hidden;
            transform: translate(-50%, -120%) scale(0.8) rotateX(10deg);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), visibility 0.4s;
            
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 20px rgba(79, 172, 254, 0.3);
            backface-visibility: hidden; /* Для плавности 3D */
        }

        .star-popup.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -120%) scale(1) rotateX(0deg);
        }

        /* Хвостик облачка */
        .star-popup::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -10px;
            border-width: 10px;
            border-style: solid;
            border-color: var(--popup-bg) transparent transparent transparent;
            filter: drop-shadow(0 3px 2px rgba(0,0,0,0.3));
        }

        .popup-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #fff;
            text-shadow: 0 0 10px #4facfe;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        .popup-fact {
            font-size: 14px;
            line-height: 1.5;
            opacity: 0.9;
        }

        /* Адаптация под телефон */
        @media (max-width: 600px) {
            #scene-container {
                width: 95vw;
                height: 90vh;
                perspective: none; /* Отключаем 3D наклон на мобильных для удобства */
            }
            
            .constellation-star {
                /* Увеличим область клика */
                width: calc(var(--base-size) * 1.5) !important;
                height: calc(var(--base-size) * 1.5) !important;
            }

            .star-popup {
                width: 80%;
                max-width: 280px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div id="scene-container">
    <div id="sky">
        <svg id="lines-container"></svg>
        </div>
</div>

<script>
    const scene = document.getElementById('scene-container');
    const sky = document.getElementById('sky');
    const svg = document.getElementById('lines-container');

    // Данные звезд созвездия (координаты в % внутри рамки)
    const starsData = [
        { name: "Сириус", x: 60, y: 25, size: 14, named: true, fact: "Самая яркая звезда ночного неба. На самом деле это двойная система: яркий Сириус A и белый карлик Сириус B." },
        { name: "Мирзам", x: 80, y: 38, size: 9, named: true, fact: "Ее название означает 'Вестник', так как она восходит незадолго до Сириуса." },
        { name: "Везен", x: 30, y: 55, size: 10, named: true, fact: "Сверхгигант, одна из самых массивных звезд, видимых невооруженным глазом. Если бы она была на месте Солнца, она поглотила бы орбиту Земли." },
        { name: "Адара", x: 35, y: 68, size: 11, named: true, fact: "Один из самых ярких известных источников ультрафиолетового излучения на небе." },
        { name: "Алудра", x: 12, y: 63, size: 9, named: true, fact: "Голубой сверхгигант, яркость которого в десятки тысяч раз превышает солнечную." },
        
        // Звезды без названий (точки созвездия)
        { x: 35, y: 46, size: 4 }, // Тело
        { x: 45, y: 15, size: 3.5 }, // Ухо
        { x: 50, y: 21, size: 5 }, // Голова
        { x: 58, y: 4.5, size: 3.5 }, // Нос
        { x: 65, y: 37, size: 3.5 }, // Путь к Мирзаму
        { x: 61, y: 52, size: 3.5 }, // Передняя лапа
        { x: 62.5, y: 83.5, size: 4 }, // Задняя лапа
        { x: 35, y: 84, size: 3.5 }, // Хвост нижний
        { x: 31, y: 62, size: 3 } // Мелочь у Везена
    ];

    // Линии созвездия (индексы из массива starsData)
    const connections = [
        [0, 1], [0, 5], [0, 7], // Сириус
        [7, 6], [7, 8], // Голова
        [5, 2], [5, 9], // Тело
        [9, 10], // Передняя лапа
        [2, 3], [2, 4], // Задняя часть
        [3, 11], [3, 12] // Хвост/лапа
    ];

    let activePopup = null; // Хранит текущее открытое окно

    // Создаем звезды и попапы
    starsData.forEach((data, index) => {
        const star = document.createElement('div');
        
        if (data.named) {
            star.className = 'constellation-star';
            star.style.setProperty('--base-size', data.size + 'px');
            star.style.width = data.size + 'px';
            star.style.height = data.size + 'px';

            // Создаем попап для этой звезды
            const popup = document.createElement('div');
            popup.className = 'star-popup';
            popup.innerHTML = `
                <div class="popup-title">${data.name}</div>
                <div class="popup-fact">${data.fact}</div>
            `;
            // Позиционируем попап относительно звезды
            popup.style.left = data.x + '%';
            popup.style.top = data.y + '%';
            sky.appendChild(popup);

            // Обработчик клика
            star.addEventListener('click', (e) => {
                e.stopPropagation(); // Предотвратить закрытие при клике на саму звезду

                // Если кликнули на ту же звезду, закрываем
                if (activePopup === popup) {
                    popup.classList.remove('active');
                    activePopup = null;
                    return;
                }

                // Закрыть предыдущее окно, если есть
                if (activePopup) {
                    activePopup.classList.remove('active');
                }

                // Открыть новое
                popup.classList.add('active');
                activePopup = popup;
            });

        } else {
            star.className = 'constellation-dot';
            star.style.width = data.size + 'px';
            star.style.height = data.size + 'px';
        }

        star.style.left = data.x + '%';
        star.style.top = data.y + '%';
        sky.appendChild(star);
    });

    // Отрисовка линий (с учетом размеров контейнера)
    function drawLines() {
        svg.innerHTML = '';
        const rect = scene.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;

        connections.forEach(pair => {
            const s1 = starsData[pair[0]];
            const s2 = starsData[pair[1]];
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", (s1.x * w) / 100);
            line.setAttribute("y1", (s1.y * h) / 100);
            line.setAttribute("x2", (s2.x * w) / 100);
            line.setAttribute("y2", (s2.y * h) / 100);
            svg.appendChild(line);
        });
    }

    // Фоновые звезды
    for (let i = 0; i < 150; i++) {
        const star = document.createElement('div');
        star.className = 'bg-star';
        const size = Math.random() * 2.5;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--duration', (Math.random() * 4 + 2) + 's');
        sky.appendChild(star);
    }

    // Закрытие попапа при клике на небо
    scene.addEventListener('click', () => {
        if (activePopup) {
            activePopup.classList.remove('active');
            activePopup = null;
        }
    });

    // --- Интерактив 3D рамки (только для ПК с мышью) ---
    if (window.innerWidth > 600) {
        scene.addEventListener('mousemove', (e) => {
            const rect = scene.getBoundingClientRect();
            const x = e.clientX - rect.left; // позиция мыши внутри элемента
            const y = e.clientY - rect.top;
            
            // Вычисляем отклонение от центра в диапазоне от -1 до 1
            const dx = (x / rect.width) - 0.5;
            const dy = (y / rect.height) - 0.5;
            
            // Применяем наклон (макс 5 градусов)
            const tiltX = dy * -5;
            const tiltY = dx * 5;
            
            scene.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
            
            // Немного сдвигаем тень для пущего эффекта
            scene.style.boxShadow = `${dx * -10}px ${dy * -10}px 30px rgba(79, 172, 254, 0.4), inset 0 0 15px rgba(79, 172, 254, 0.3)`;
        });

        // Сброс наклона при уходе мыши
        scene.addEventListener('mouseleave', () => {
            scene.style.transform = 'rotateX(0deg) rotateY(0deg)';
            scene.style.boxShadow = 'var(--frame-glow)';
        });
    }

    // Инициализация
    window.addEventListener('load', drawLines);
    window.addEventListener('resize', drawLines);
</script>

</body>
</html>
